name = "backend-streamhub"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Variables d'environnement (les secrets vont dans wrangler secret put)
[vars]
OLLAMA_MODEL = "minimax-m2.5:cloud"
# OLLAMA_URL → wrangler secret put OLLAMA_URL  (ne pas mettre une URL privée ici)

# KV namespace pour le cache des labels Ollama
# Créer avec : wrangler kv:namespace create LABEL_CACHE
# Puis remplacer l'id ci-dessous par celui retourné
[[kv_namespaces]]
binding = "backend"
id = "4075fb3d1bdc42f8a94dd012dc91470f"
