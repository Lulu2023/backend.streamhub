name = "backend-streamhub"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[observability]
enabled = true

# Workers AI — binding natif, gratuit jusqu'à 10 000 req/jour
[ai]
binding = "AI"

# KV namespace pour le cache des labels IA (classification thème/genre)
[[kv_namespaces]]
binding = "LABEL_CACHE"
id = "4075fb3d1bdc42f8a94dd012dc91470f"

# KV namespace pour les données précalculées (home + list par thème)
# Créer avec : wrangler kv:namespace create DATA_CACHE
# Puis remplacer l'id ci-dessous par celui retourné
[[kv_namespaces]]
binding = "DATA_CACHE"
id = "REMPLACER_PAR_ID_DATA_CACHE"

# Cron Trigger — rafraîchit les données toutes les 3h en background
# Le worker tourne sans requête utilisateur, met à jour DATA_CACHE
[triggers]
crons = ["0 */3 * * *"]
